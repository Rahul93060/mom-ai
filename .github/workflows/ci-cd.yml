name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    name: Test, Build, Push Docker Image, Deploy
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: django_project.settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies with Poetry
        run: poetry install --no-interaction --no-ansi 

      - name: Run Django tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: poetry run python manage.py test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mom-ai:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/mom-ai:latest ${{ secrets.DOCKER_USERNAME }}/mom-ai:${{ github.sha }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mom-ai:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mom-ai:${{ github.sha }}

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -X POST "$RENDER_DEPLOY_HOOK"
